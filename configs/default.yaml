# AgentEditor Default Configuration

# Data
data:
  data_dir: "data/scene"
  data_type: "colmap"  # colmap or nerf
  width: 512
  height: 512
  load_images: true
  split_ratio: 0.9
  shuffle: true
  batch_size: 1
  num_workers: 4

# Geometry
geometry:
  sh_degree: 3
  lang_feature_dim: 3
  
  # Learning rates
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001
  lang_lr: 0.005
  
  # Densification
  percent_dense: 0.01
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002
  
  # Pruning
  prune_from_iter: 500
  prune_until_iter: 15000
  prune_interval: 100
  min_opacity: 0.005
  
  # Initialization
  opacity_init: 0.1
  max_scaling: 100.0
  color_clip: 2.0

# Renderer
renderer:
  debug: false
  invert_bg_prob: 1.0
  back_ground_color: [1.0, 1.0, 1.0]

# System
system:
  distill_lang_freq: 800
  distill_lang_epoch: 100
  distill_interval: 2
  
  # SAM+CLIP
  sam_clip:
    clip_model_type: "ViT-B-16"
    clip_model_pretrained: "laion2b_s34b_b88k"
    clip_n_dims: 512
    sam_ckpt_path: "ckpts/sam_vit_h_4b8939.pth"
    mobile_sam_ckpt_path: "ckpts/mobile_sam.pt"
    use_mobile_sam: true
    feature_level: 3
    vis_pca_feature: true
  
  # Autoencoder
  encoder_hidden_dims: [256, 128, 64, 32, 3]
  decoder_hidden_dims: [32, 64, 128, 256, 512]
  ae_epoch: 100
  sam_clip_ae_lr: 0.0003
  
  # Training
  densify: true
  xyz_noise_ratio: 0.0
  
  # Loss weights
  lambda_sds: 1.0
  lambda_ref: 0.0
  lambda_scaling: 0.0
  
  # Prompt
  prompt: "a scene"
  empty_prompt: "empty"
  side_prompt: "empty"
  
  # Outpainting
  outpaint_step: 300
  crop_with_lang: true
  rotate_aug_scale: 15

# Training
training:
  iterations: 30000
  save_interval: 1000
  val_interval: 1000

# Output
output:
  output_dir: "outputs"
  save_ckpt: true
  save_ply: true
